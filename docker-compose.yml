version: "3.9"

# ================================================================
# Banco Futura – Churn & VIP System
# docker-compose.yml | Entorno de desarrollo local
# ================================================================

services:

  # ── Zookeeper (requerido por Kafka) ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - banco-futura

  # ── Apache Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bf-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - banco-futura

  # ── MLflow Tracking Server ────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: bf-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    networks:
      - banco-futura

  # ── FastAPI (Scoring API) ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bf-api
    ports:
      - "8000:8000"
    environment:
      - ENV=local
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mlflow
    networks:
      - banco-futura

  # ── Spark Master (standalone cluster local) ───────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: bf-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"      # Spark Web UI
      - "7077:7077"      # Spark master port
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./src:/opt/bitnami/spark/src
    networks:
      - banco-futura

  spark-worker:
    image: bitnami/spark:3.5
    container_name: bf-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    depends_on:
      - spark-master
    networks:
      - banco-futura

  # ── Jupyter Lab (notebooks) ───────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: bf-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    depends_on:
      - spark-master
      - mlflow
    networks:
      - banco-futura

# ── Volúmenes persistentes ────────────────────────────────────────────
volumes:
  zookeeper_data:
  kafka_data:
  mlflow_artifacts:

# ── Red interna del proyecto ──────────────────────────────────────────
networks:
  banco-futura:
    driver: bridge
